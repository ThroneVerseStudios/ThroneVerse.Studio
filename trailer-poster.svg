<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f16"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Decorative elements -->
  <circle cx="200" cy="200" r="300" fill="rgba(255,215,0,0.03)"/>
  <circle cx="1720" cy="880" r="400" fill="rgba(255,107,53,0.03)"/>

  <!-- Center content -->
  <text x="960" y="450" font-family="serif" font-size="120" font-weight="bold" text-anchor="middle" fill="url(#goldText)">KENYAN</text>
  <text x="960" y="580" font-family="serif" font-size="140" font-weight="bold" text-anchor="middle" fill="url(#goldText)">THRONES</text>

  <!-- Crown icon -->
  <text x="960" y="300" font-size="150" text-anchor="middle" fill="#FFD700">👑</text>

  <!-- Play button hint -->
  <circle cx="960" cy="750" r="80" fill="rgba(255,215,0,0.2)" stroke="#FFD700" stroke-width="4"/>
  <text x="960" y="775" font-size="60" text-anchor="middle" fill="#FFD700">▶</text>

  <!-- Bottom text -->
  <text x="960" y="950" font-family="sans-serif" font-size="24" text-anchor="middle" fill="#888" letter-spacing="8">OFFICIAL TRAILER</text>
</svg>